name: Generate RSS Feed

# This tells GitHub to run the script ONLY when news.json is updated
on:
  push:
    paths:
      - 'news.json'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the RSS script
        run: node generate-rss.js

      - name: Commit the new feed.xml back to the repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Update RSS feed"
          file_pattern: 'feed.xml'
