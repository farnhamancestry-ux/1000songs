name: Build Community Index
on: [push]

# This block gives the action permission to write changes back to the repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Index
        run: |
          # Create the directory if it doesn't exist
          mkdir -p community-archives
          
          # Check if there are any .json files to process
          # This prevents jq from failing with exit code 2 when no files match the glob
          if ls community-archives/*.json >/dev/null 2>&1; then
            jq -s 'add' community-archives/*.json > community-index.json
          else
            echo "No archive files found. Creating empty index."
            echo "[]" > community-index.json
          fi

      - name: Commit index
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add community-index.json
          
          # Only commit and push if there are actual changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update community index"
            git push
          fi
